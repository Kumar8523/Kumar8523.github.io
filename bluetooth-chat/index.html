<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluetooth Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="flex flex-col items-center justify-center h-screen bg-gray-100">
    <h1 class="text-2xl font-bold mb-4">Bluetooth Chat</h1>
    <button id="connectBtn" class="bg-blue-500 text-white px-4 py-2 rounded">Connect Bluetooth</button>
    <textarea id="chatBox" class="w-80 h-40 mt-4 p-2 border rounded" placeholder="Messages will appear here..." readonly></textarea>
    <input id="messageInput" type="text" placeholder="Type a message..." class="mt-2 p-2 border rounded w-80">
    <button id="sendBtn" class="bg-green-500 text-white px-4 py-2 rounded mt-2">Send</button>
    <script src="script.js"></script>
</body>
</html>
