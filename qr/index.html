<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR & Barcode Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan-2.1.0.min.js"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">Smart Code Generator & Scanner</h1>
            <div class="flex justify-center space-x-4 mb-4">
                <button id="generatorTab" class="px-4 py-2 bg-blue-500 text-white rounded">Generator</button>
                <button id="scannerTab" class="px-4 py-2 bg-green-500 text-white rounded">Scanner</button>
            </div>
        </header>

        <!-- Generator Section -->
        <div id="generatorSection" class="bg-white p-6 rounded-lg shadow-md mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-2">Content:</label>
                    <textarea id="content" class="w-full p-2 border rounded mb-4" rows="4"></textarea>
                    
                    <label class="block mb-2">Code Type:</label>
                    <select id="codeType" class="w-full p-2 border rounded mb-4">
                        <option value="qrcode">QR Code</option>
                        <option value="code128">Barcode (CODE128)</option>
                    </select>

                    <button onclick="generateCode()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                        Generate
                    </button>
                </div>

                <div>
                    <div id="output" class="border p-4 rounded text-center"></div>
                    <button onclick="downloadCode()" class="mt-4 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 hidden" id="downloadBtn">
                        Download
                    </button>
                </div>
            </div>
        </div>

        <!-- Scanner Section -->
        <div id="scannerSection" class="bg-white p-6 rounded-lg shadow-md hidden">
            <div class="text-center mb-4">
                <button onclick="startScan()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                    Start Scanning
                </button>
            </div>
            <video id="preview" class="w-full rounded-lg border"></video>
            <div id="scanResult" class="mt-4 p-4 bg-gray-100 rounded"></div>
        </div>

        <!-- History Section -->
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4">History</h2>
            <div id="history" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
    </div>

    <script>
        let currentScanner = null;
        let currentCode = null;
        let history = JSON.parse(localStorage.getItem('codeHistory')) || [];

        // Tab Switching
        document.getElementById('generatorTab').addEventListener('click', () => {
            document.getElementById('generatorSection').classList.remove('hidden');
            document.getElementById('scannerSection').classList.add('hidden');
        });

        document.getElementById('scannerTab').addEventListener('click', () => {
            document.getElementById('scannerSection').classList.remove('hidden');
            document.getElementById('generatorSection').classList.add('hidden');
        });

        // Generate Code
        function generateCode() {
            const content = document.getElementById('content').value;
            const type = document.getElementById('codeType').value;
            const output = document.getElementById('output');
            output.innerHTML = '';

            if (content) {
                if (type === 'qrcode') {
                    new QRCode(output, {
                        text: content,
                        width: 200,
                        height: 200
                    });
                } else {
                    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                    JsBarcode(svg, content, {
                        format: "CODE128",
                        displayValue: true
                    });
                    output.appendChild(svg);
                }

                document.getElementById('downloadBtn').classList.remove('hidden');
                currentCode = { content, type, timestamp: new Date() };
                saveToHistory();
            }
        }

        // Download Code
        function downloadCode() {
            if (currentCode) {
                const canvas = document.querySelector('#output canvas, #output svg');
                const link = document.createElement('a');
                link.download = `${currentCode.type}_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            }
        }

        // Scanner Functionality
        function startScan() {
            const scannerSection = document.getElementById('scannerSection');
            Instascan.Camera.getCameras().then(cameras => {
                if (cameras.length > 0) {
                    currentScanner = new Instascan.Scanner({
                        video: document.getElementById('preview'),
                        mirror: false
                    });

                    currentScanner.addListener('scan', content => {
                        document.getElementById('scanResult').innerHTML = `
                            <strong>Scanned Content:</strong> ${content}
                        `;
                    });

                    currentScanner.start(cameras[0]);
                } else {
                    alert('No cameras found!');
                }
            });
        }

        // History Management
        function saveToHistory() {
            history.unshift(currentCode);
            if (history.length > 10) history.pop();
            localStorage.setItem('codeHistory', JSON.stringify(history));
            updateHistoryDisplay();
        }

        function updateHistoryDisplay() {
            const historyDiv = document.getElementById('history');
            historyDiv.innerHTML = history.map(item => `
                <div class="p-2 border rounded">
                    <div class="text-sm mb-1">${item.type}</div>
                    <div class="truncate">${item.content}</div>
                    <div class="text-xs text-gray-500">${new Date(item.timestamp).toLocaleString()}</div>
                </div>
            `).join('');
        }

        // Initial history load
        updateHistoryDisplay();
    </script>
</body>
</html>
