<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Finance Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .card:hover {
            transform: translateY(-2px);
            transition: transform 0.2s ease;
        }
        .dark-mode {
            background-color: #1a202c;
            color: #e2e8f0;
        }
        .dark-mode .card {
            background-color: #2d3748;
            color: #e2e8f0;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Advanced Finance Manager</h1>
            <button onclick="toggleDarkMode()" 
                    class="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition-colors">
                Toggle Dark Mode
            </button>
        </div>

        <!-- Add Transaction Form -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="transactionTitle" placeholder="Transaction Title" 
                       class="p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="transactionAmount" placeholder="Amount" 
                       class="p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <select id="transactionType" 
                        class="p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
                <select id="transactionCategory" 
                        class="p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="other">Other</option>
                    <option value="food">Food</option>
                    <option value="transport">Transport</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="utilities">Utilities</option>
                </select>
                <button onclick="addTransaction()" 
                        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors">
                    Add Transaction
                </button>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="card bg-green-100 p-4 rounded-lg">
                <h3 class="text-lg font-semibold text-gray-800">Total Income</h3>
                <p id="totalIncome" class="text-2xl font-bold text-green-700">₹0</p>
            </div>
            <div class="card bg-red-100 p-4 rounded-lg">
                <h3 class="text-lg font-semibold text-gray-800">Total Expense</h3>
                <p id="totalExpense" class="text-2xl font-bold text-red-700">₹0</p>
            </div>
            <div class="card bg-blue-100 p-4 rounded-lg">
                <h3 class="text-lg font-semibold text-gray-800">Balance</h3>
                <p id="balance" class="text-2xl font-bold text-blue-700">₹0</p>
            </div>
            <div class="card bg-purple-100 p-4 rounded-lg">
                <h3 class="text-lg font-semibold text-gray-800">Savings Goal</h3>
                <p id="savingsGoal" class="text-2xl font-bold text-purple-700">₹0</p>
            </div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow-md p-4">
                <canvas id="financeChart"></canvas>
            </div>
            <div class="bg-white rounded-lg shadow-md p-4">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- Reports -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Reports</h2>
            <div class="flex gap-4 mb-4">
                <button onclick="loadWeeklyReport()" 
                        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors">
                    Weekly Report
                </button>
                <button onclick="loadMonthlyReport()" 
                        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors">
                    Monthly Report
                </button>
                <button onclick="loadYearlyReport()" 
                        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors">
                    Yearly Report
                </button>
            </div>
            <div id="reportResult" class="text-gray-800"></div>
        </div>

        <!-- Transaction List -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Transaction History</h2>
            <div id="transactionList" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // Initialize transactions array
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        // Charts
        const ctx = document.getElementById('financeChart').getContext('2d');
        const financeChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Income', 'Expense'],
                datasets: [{
                    label: 'Amount',
                    data: [0, 0],
                    backgroundColor: ['rgba(75, 192, 192, 0.2)', 'rgba(255, 99, 132, 0.2)'],
                    borderColor: ['rgba(75, 192, 192, 1)', 'rgba(255, 99, 132, 1)'],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        const categoryCtx = document.getElementById('categoryChart').getContext('2d');
        const categoryChart = new Chart(categoryCtx, {
            type: 'pie',
            data: {
                labels: ['Food', 'Transport', 'Entertainment', 'Utilities', 'Other'],
                datasets: [{
                    label: 'Expense by Category',
                    data: [0, 0, 0, 0, 0],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)',
                        'rgba(75, 192, 192, 0.2)',
                        'rgba(153, 102, 255, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)',
                        'rgba(153, 102, 255, 1)'
                    ],
                    borderWidth: 1
                }]
            }
        });

        // Add transaction
        function addTransaction() {
            const title = document.getElementById('transactionTitle').value.trim();
            const amount = parseFloat(document.getElementById('transactionAmount').value);
            const type = document.getElementById('transactionType').value;
            const category = document.getElementById('transactionCategory').value;

            if (title && !isNaN(amount)) {
                const transaction = {
                    id: Date.now().toString(),
                    title,
                    amount,
                    type,
                    category,
                    date: new Date().toISOString()
                };

                transactions.push(transaction);
                saveTransactions();
                renderTransactions();
                updateSummary();
                updateCharts();
                document.getElementById('transactionTitle').value = '';
                document.getElementById('transactionAmount').value = '';
            }
        }

        // Delete transaction
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveTransactions();
            renderTransactions();
            updateSummary();
            updateCharts();
        }

        // Save transactions to localStorage
        function saveTransactions() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // Render transactions
        function renderTransactions() {
            const transactionList = document.getElementById('transactionList');
            transactionList.innerHTML = transactions.map(transaction => `
                <div class="card border rounded-lg p-3 hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="font-semibold">${transaction.title}</h3>
                            <p class="text-sm text-gray-600">${new Date(transaction.date).toLocaleDateString()}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <p class="${transaction.type === 'income' ? 'text-green-700' : 'text-red-700'} font-semibold">
                                ₹${transaction.amount}
                            </p>
                            <button onclick="deleteTransaction('${transaction.id}')" 
                                    class="text-red-500 hover:text-red-700">
                                Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Update summary
        function updateSummary() {
            const totalIncome = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);

            const totalExpense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);

            const balance = totalIncome - totalExpense;

            document.getElementById('totalIncome').textContent = `₹${totalIncome}`;
            document.getElementById('totalExpense').textContent = `₹${totalExpense}`;
            document.getElementById('balance').textContent = `₹${balance}`;
        }

        // Update charts
        function updateCharts() {
            const totalIncome = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);

            const totalExpense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);

            financeChart.data.datasets[0].data = [totalIncome, totalExpense];
            financeChart.update();

            const categories = ['food', 'transport', 'entertainment', 'utilities', 'other'];
            const categoryData = categories.map(cat => 
                transactions
                    .filter(t => t.type === 'expense' && t.category === cat)
                    .reduce((sum, t) => sum + t.amount, 0)
            );

            categoryChart.data.datasets[0].data = categoryData;
            categoryChart.update();
        }

        // Load weekly report
        function loadWeeklyReport() {
            const now = new Date();
            const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            const weeklyTransactions = transactions.filter(t => new Date(t.date) >= oneWeekAgo);

            const totalIncome = weeklyTransactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);

            const totalExpense = weeklyTransactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);

            document.getElementById('reportResult').innerHTML = `
                <p>Weekly Income: ₹${totalIncome}</p>
                <p>Weekly Expense: ₹${totalExpense}</p>
            `;
        }

        // Load monthly report
        function loadMonthlyReport() {
            const now = new Date();
            const oneMonthAgo = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate());
            const monthlyTransactions = transactions.filter(t => new Date(t.date) >= oneMonthAgo);

            const totalIncome = monthlyTransactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);

            const totalExpense = monthlyTransactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);

            document.getElementById('reportResult').innerHTML = `
                <p>Monthly Income: ₹${totalIncome}</p>
                <p>Monthly Expense: ₹${totalExpense}</p>
            `;
        }

        // Load yearly report
        function loadYearlyReport() {
            const now = new Date();
            const oneYearAgo = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
            const yearlyTransactions = transactions.filter(t => new Date(t.date) >= oneYearAgo);

            const totalIncome = yearlyTransactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);

            const totalExpense = yearlyTransactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);

            document.getElementById('reportResult').innerHTML = `
                <p>Yearly Income: ₹${totalIncome}</p>
                <p>Yearly Expense: ₹${totalExpense}</p>
            `;
        }

        // Toggle dark mode
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        // Initial render
        renderTransactions();
        updateSummary();
        updateCharts();
    </script>
</body>
</html>
