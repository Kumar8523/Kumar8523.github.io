<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>অ্যাডমিন প্যানেল</h1>
        <form id="audioForm">
            <input type="file" id="audioFile" accept="audio/*">
            <input type="text" id="audioUrl" placeholder="অথবা অডিও URL লিখুন">
            <button type="submit">অডিও আপডেট করুন</button>
        </form>
        <button id="startLive">লাইভ ভয়েস শুরু করুন</button>
    </div>
    <script src="admin.js"></script>
</body>
</html>
