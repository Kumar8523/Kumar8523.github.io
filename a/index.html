<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk File Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Bulk File Downloader</h1>
        
        <div class="mb-4">
            <input 
                type="url" 
                id="urlInput" 
                placeholder="Enter URL (e.g., http://example.com/files)" 
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
        </div>
        
        <button 
            onclick="startDownload()" 
            class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 transition duration-200"
        >
            Download All Files
        </button>

        <div id="status" class="mt-4 text-center text-gray-600"></div>
    </div>

    <script>
        async function startDownload() {
            const urlInput = document.getElementById('urlInput');
            const statusDiv = document.getElementById('status');
            
            if(!urlInput.value) {
                statusDiv.textContent = "Please enter a valid URL";
                return;
            }

            try {
                statusDiv.textContent = "Fetching file list...";
                const response = await fetch(urlInput.value);
                const html = await response.text();
                const files = parseFilesFromHTML(html);
                
                statusDiv.textContent = `Found ${files.length} files, starting downloads...`;
                
                // Download files one by one
                for(const file of files) {
                    await downloadFile(file);
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
                
                statusDiv.textContent = "All downloads completed!";
            } catch (error) {
                statusDiv.textContent = "Error: " + error.message;
            }
        }

        function parseFilesFromHTML(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const links = Array.from(doc.querySelectorAll('a[href]'));
            
            return links
                .map(link => link.href)
                .filter(href => 
                    !href.endsWith('/') && 
                    !href.includes('?') && 
                    !href.startsWith('mailto:') &&
                    !href.startsWith('javascript:')
                );
        }

        function downloadFile(url) {
            return new Promise((resolve, reject) => {
                const anchor = document.createElement('a');
                anchor.href = url;
                anchor.download = url.split('/').pop();
                anchor.style.display = 'none';
                
                anchor.onclick = () => {
                    setTimeout(() => {
                        document.body.removeChild(anchor);
                        resolve();
                    }, 100);
                };
                
                document.body.appendChild(anchor);
                anchor.click();
            });
        }
    </script>
</body>
</html>
