<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>এডমিন পেজ - অনলাইন বেতার</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="container mx-auto p-4">
    <h1 class="text-3xl font-bold mb-4">এডমিন পেজ</h1>
    <button id="startBtn" class="bg-green-500 text-white px-4 py-2 rounded">স্টার্ট ব্রডকাস্ট</button>
    <button id="stopBtn" class="bg-red-500 text-white px-4 py-2 rounded ml-2" disabled>স্টপ ব্রডকাস্ট</button>
    <input type="text" id="programName" placeholder="অনুষ্ঠানের নাম লিখুন" class="border p-2 rounded w-full mt-2">
    <button id="updateProgramBtn" class="bg-blue-500 text-white px-4 py-2 rounded mt-2">আপডেট অনুষ্ঠান</button>
    <p id="status" class="mt-4 text-gray-700">ব্রডকাস্ট চলছে না</p>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let mediaRecorder, stream;
    document.getElementById('startBtn').addEventListener('click', async () => {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          event.data.arrayBuffer().then(buffer => socket.emit('audio-chunk', buffer));
        }
      };
      mediaRecorder.start(1000);
      document.getElementById('startBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      document.getElementById('status').innerText = 'ব্রডকাস্ট চলছে...';
    });
    document.getElementById('stopBtn').addEventListener('click', () => {
      mediaRecorder.stop();
      stream.getTracks().forEach(track => track.stop());
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('status').innerText = 'ব্রডকাস্ট বন্ধ।';
    });
    document.getElementById('updateProgramBtn').addEventListener('click', () => {
      const programName = document.getElementById('programName').value;
      socket.emit('program-info', programName);
    });
  </script>
</body>
</html>
