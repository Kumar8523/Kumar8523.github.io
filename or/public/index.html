<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>অনলাইন বেতার</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="container mx-auto p-4">
    <h1 class="text-4xl font-bold mb-4">বর্তমানে সম্প্রচার চলছে</h1>
    <div id="programInfo" class="mb-4 p-4 bg-white rounded shadow">
      <p id="currentProgram">কোন অনুষ্ঠান চলছে না</p>
    </div>
    <audio id="audioPlayer" controls autoplay class="w-full"></audio>
    <p id="errorMsg" class="text-red-500 mt-2"></p>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.on('audio-chunk', (data) => {
      const audioPlayer = document.getElementById('audioPlayer');
      const blob = new Blob([new Uint8Array(data)], { type: 'audio/webm' });
      audioPlayer.src = URL.createObjectURL(blob);
      audioPlayer.play();
    });
    socket.on('program-info', (info) => {
      document.getElementById('currentProgram').innerText = info || 'কোন অনুষ্ঠান চলছে না';
    });
  </script>
</body>
</html>
